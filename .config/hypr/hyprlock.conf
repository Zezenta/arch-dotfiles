general {
    grace = 0
    hide_cursor = true
    no_fade_in = true
}

background {
    color = rgba(30, 30, 46, 1.0)
}

label {
    text = cmd[update:1000] echo "$TIME"
    color = rgba(205, 214, 244, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$DATE"
    color = rgba(166, 173, 200, 1.0)
    font_size = 20
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_fade_passes = 0
    dots_rounding = -1
    dots_center = true
    rounding = 0
    outer_color = rgba(137, 180, 250, 0.5)
    inner_color = rgba(30, 30, 46, 1.0)
    font_family = JetBrainsMono Nerd Font
    font_color = rgba(205, 214, 244, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    check_color = rgba(166, 227, 161, 1.0)
    placeholder_text = <b>Enter Password</b>
    fade_on_empty = false
    position = 0, -60
    halign = center
    valign = center
}
